id: beaker-basics
title: "Beaker Basics Quiz"
description: "Test your understanding of EPIC's Beaker module for laboratory and anatomic pathology."
concepts: ["beaker", "beaker-ap"]
difficulty: beginner

questions:
  - id: q1
    text: "What are the two main components of EPIC's Beaker module?"
    type: multiple_choice
    options:
      - "Beaker CP (Clinical Pathology) and Beaker AP (Anatomic Pathology)"
      - "Beaker Lab and Beaker Radiology"
      - "Beaker Orders and Beaker Results"
      - "Beaker Inpatient and Beaker Outpatient"
    correct: 0
    explanation: "Beaker is divided into Clinical Pathology (CP) for routine lab work like chemistry and hematology, and Anatomic Pathology (AP) for tissue-based diagnostics like surgical pathology and cytology."

  - id: q2
    text: "What is 'accessioning' in the context of Beaker?"
    type: multiple_choice
    options:
      - "Signing a final pathology report"
      - "Receiving a specimen in the lab and assigning it a unique number"
      - "Ordering a new lab test"
      - "Sending results to the ordering provider"
    correct: 1
    explanation: "Accessioning is the process of receiving a specimen, verifying it against the order, and assigning a unique accession number that links the physical specimen to the electronic record."

  - id: q3
    text: "What is the difference between an amendment and an addendum in pathology reporting?"
    type: multiple_choice
    options:
      - "They are the same thing"
      - "An amendment corrects an error; an addendum adds new information"
      - "An addendum corrects an error; an amendment adds new information"
      - "Amendments are for AP; addenda are for CP"
    correct: 1
    explanation: "An amendment corrects an error in a previously signed report and requires documentation of the reason for change. An addendum adds additional information, such as results from special stains or molecular tests that came back after the initial sign-out."

  - id: q4
    text: "After a pathologist signs out a case in Beaker, how does the ordering clinician find out?"
    type: multiple_choice
    options:
      - "They have to call the pathology lab"
      - "An InBasket message is sent and the result appears in Chart Review"
      - "The pathologist must manually fax the report"
      - "Results are only available in MyChart"
    correct: 1
    explanation: "When a pathologist signs a case, EPIC automatically sends an InBasket notification to the ordering provider. The full report also becomes available in the Results section of Chart Review."

  - id: q5
    text: "What is a synoptic report in Beaker AP?"
    type: multiple_choice
    options:
      - "A summary of all lab results for a patient"
      - "A structured cancer reporting template based on CAP protocols"
      - "A brief one-line diagnosis"
      - "A report generated by the lab instrument automatically"
    correct: 1
    explanation: "Synoptic reports are structured data entry templates based on College of American Pathologists (CAP) cancer protocols. They ensure that all required data points (tumor type, size, margins, grade, stage, etc.) are captured for cancer cases."
